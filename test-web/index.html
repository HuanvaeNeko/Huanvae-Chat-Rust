<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HuanVae Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="user-avatar" id="currentUserAvatar" onclick="showProfileModal()">
          <span class="avatar-placeholder">👤</span>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <button class="nav-btn active" data-panel="chats" onclick="switchPanel('chats')" title="聊天">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="nav-badge" id="unreadBadge" style="display: none;">0</span>
        </button>
        <button class="nav-btn" data-panel="contacts" onclick="switchPanel('contacts')" title="通讯录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </button>
        <button class="nav-btn" data-panel="groups" onclick="switchPanel('groups')" title="群聊">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </button>
        <button class="nav-btn" data-panel="files" onclick="switchPanel('files')" title="文件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
      </nav>
      
      <div class="sidebar-footer">
        <!-- WebSocket 状态指示器 -->
        <div class="ws-status" title="实时消息连接状态" onclick="toggleWsConnection()">
          <span id="wsStatusIndicator" class="ws-status-indicator disconnected"></span>
          <span id="wsStatusText" class="ws-status-text">未连接</span>
        </div>
        
        <button class="nav-btn" onclick="showSettingsModal()" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- 会话/联系人列表区域 -->
    <section class="list-panel">
      <!-- 搜索栏 -->
      <div class="list-header">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="搜索" oninput="handleSearch(this.value)">
        </div>
        <button class="icon-btn" onclick="showAddMenu()" title="添加">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <!-- 聊天列表面板 -->
      <div class="panel-content" id="panel-chats">
        <div class="conversation-list" id="conversationList">
          <div class="empty-state">
            <div class="empty-icon">💬</div>
            <p>暂无会话</p>
            <p class="empty-hint">添加好友开始聊天</p>
          </div>
        </div>
      </div>

      <!-- 通讯录面板 -->
      <div class="panel-content" id="panel-contacts" style="display: none;">
        <div class="panel-tabs">
          <button class="panel-tab active" onclick="switchContactTab('friends')">好友</button>
          <button class="panel-tab" onclick="switchContactTab('pending')">新朋友</button>
          <button class="panel-tab" onclick="switchContactTab('sent')">已发送</button>
        </div>
        <div class="contact-list" id="friendsList">
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <p>暂无好友</p>
          </div>
        </div>
        <div class="contact-list" id="pendingList" style="display: none;"></div>
        <div class="contact-list" id="sentList" style="display: none;"></div>
      </div>

      <!-- 群聊面板 -->
      <div class="panel-content" id="panel-groups" style="display: none;">
        <div class="panel-tabs">
          <button class="panel-tab active" onclick="switchGroupTab('myGroups')">我的群聊</button>
          <button class="panel-tab" onclick="switchGroupTab('invitations')">群邀请</button>
        </div>
        <div class="group-list" id="myGroupsList">
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <p>暂无群聊</p>
            <button class="btn-primary" onclick="showCreateGroupModal()">创建群聊</button>
          </div>
        </div>
        <div class="group-list" id="groupInvitationsList" style="display: none;"></div>
      </div>

      <!-- 文件面板 -->
      <div class="panel-content" id="panel-files" style="display: none;">
        <div class="panel-tabs">
          <button class="panel-tab active" onclick="switchFileTab('myFiles')">我的文件</button>
          <button class="panel-tab" onclick="switchFileTab('upload')">上传文件</button>
        </div>
        <div class="file-list" id="myFilesList">
          <div class="empty-state">
            <div class="empty-icon">📁</div>
            <p>暂无文件</p>
          </div>
        </div>
        <div class="upload-panel" id="uploadPanel" style="display: none;">
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" style="display: none;" onchange="handleFileSelect(this.files)">
            <div class="upload-icon">📤</div>
            <p>点击或拖拽文件到此处上传</p>
            <p class="upload-hint">支持图片、视频、文档，最大 500MB</p>
          </div>
          <div class="upload-options">
            <div class="form-group">
              <label>存储位置</label>
              <select id="uploadLocation" onchange="toggleRelatedId()">
                <option value="user_files">个人文件</option>
                <option value="friend_messages">发送给好友</option>
                <option value="group_files">发送到群聊</option>
              </select>
            </div>
            <div class="form-group" id="relatedIdGroup" style="display: none;">
              <label>选择目标</label>
              <select id="uploadRelatedId"></select>
            </div>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="forceUpload">
                <span>强制上传（跳过秒传）</span>
              </label>
            </div>
          </div>
          <div class="upload-progress" id="uploadProgress" style="display: none;">
            <div class="progress-bar">
              <div class="progress-fill" id="uploadProgressFill"></div>
            </div>
            <p class="progress-text" id="uploadProgressText">准备上传...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- 主聊天区域 -->
    <main class="chat-panel" id="chatPanel">
      <!-- 未选择聊天时的欢迎界面 -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
          <div class="welcome-logo">💬</div>
          <h2>HuanVae Chat</h2>
          <p>选择一个会话开始聊天</p>
          <div class="quick-actions" id="quickActions" style="display: none;">
            <button onclick="showAddFriendModal()">➕ 添加好友</button>
            <button onclick="showCreateGroupModal()">👥 创建群聊</button>
          </div>
        </div>
      </div>

      <!-- 聊天界面 -->
      <div class="chat-view" id="chatView" style="display: none;">
        <!-- 聊天头部 -->
        <header class="chat-header">
          <div class="chat-info">
            <div class="chat-avatar" id="chatAvatar">
              <span class="avatar-placeholder">👤</span>
            </div>
            <div class="chat-meta">
              <h3 id="chatName">聊天名称</h3>
              <span class="chat-status" id="chatStatus"></span>
            </div>
          </div>
          <div class="chat-actions">
            <button class="icon-btn" onclick="toggleInfoPanel()" title="详情">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
              </svg>
            </button>
            <button class="icon-btn" id="btnGroupNotice" onclick="showGroupNotices()" title="公告" style="display: none;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
                <line x1="4" y1="22" x2="4" y2="15"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- 消息列表 -->
        <div class="message-container" id="messageContainer">
          <div class="message-list" id="messageList">
            <div class="message-loading" id="messageLoading" style="display: none;">
              <div class="loading-spinner"></div>
              <span>加载消息中...</span>
            </div>
          </div>
        </div>

        <!-- 输入区域 -->
        <footer class="chat-input-area">
          <div class="input-toolbar">
            <button class="tool-btn" onclick="document.getElementById('chatFileInput').click()" title="发送文件">
              <input type="file" id="chatFileInput" style="display: none;" onchange="sendFileMessage(this.files)">
              📎
            </button>
            <button class="tool-btn" onclick="showEmojiPicker()" title="表情">😊</button>
          </div>
          <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1" 
              onkeydown="handleInputKeydown(event)" oninput="autoResizeInput(this)"></textarea>
          </div>
          <button class="send-btn" onclick="sendMessage()" title="发送">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </footer>
      </div>
    </main>

    <!-- 右侧信息面板 -->
    <aside class="info-panel" id="infoPanel" style="display: none;">
      <header class="info-header">
        <h3 id="infoPanelTitle">详细信息</h3>
        <button class="icon-btn" onclick="toggleInfoPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </header>
      <div class="info-content" id="infoPanelContent">
        <!-- 动态填充 -->
      </div>
    </aside>
  </div>

  <!-- 登录/注册模态框 -->
  <div class="modal" id="authModal">
    <div class="modal-backdrop" onclick="closeModal('authModal')"></div>
    <div class="modal-content auth-modal">
      <div class="auth-header">
        <h2>HuanVae Chat</h2>
        <p>登录或注册开始聊天</p>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
      </div>
      
      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>用户ID</label>
          <input type="text" id="loginUserId" required placeholder="请输入用户ID">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="loginPassword" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn-primary btn-block">登录</button>
      </form>
      
      <form id="registerForm" class="auth-form" style="display: none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>用户ID</label>
          <input type="text" id="regUserId" required placeholder="唯一用户标识">
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="regNickname" required placeholder="显示昵称">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="regPassword" required placeholder="至少6位" minlength="6">
        </div>
        <div class="form-group">
          <label>邮箱（可选）</label>
          <input type="email" id="regEmail" placeholder="email@example.com">
        </div>
        <button type="submit" class="btn-primary btn-block">注册</button>
      </form>
    </div>
  </div>

  <!-- 添加好友模态框 -->
  <div class="modal" id="addFriendModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('addFriendModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>添加好友</h3>
        <button class="icon-btn" onclick="closeModal('addFriendModal')">✕</button>
      </div>
      <form onsubmit="submitFriendRequest(event)">
        <div class="form-group">
          <label>用户ID</label>
          <input type="text" id="addFriendId" required placeholder="请输入对方用户ID">
        </div>
        <div class="form-group">
          <label>验证消息</label>
          <textarea id="addFriendMsg" rows="3" placeholder="请输入验证消息（可选）"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal('addFriendModal')">取消</button>
          <button type="submit" class="btn-primary">发送请求</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 创建群聊模态框 -->
  <div class="modal" id="createGroupModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('createGroupModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>创建群聊</h3>
        <button class="icon-btn" onclick="closeModal('createGroupModal')">✕</button>
      </div>
      <form onsubmit="createGroup(event)">
        <div class="form-group">
          <label>群名称</label>
          <input type="text" id="groupName" required placeholder="请输入群名称">
        </div>
        <div class="form-group">
          <label>群描述</label>
          <textarea id="groupDesc" rows="3" placeholder="请输入群描述（可选）"></textarea>
        </div>
        <div class="form-group">
          <label>加群方式</label>
          <select id="groupJoinMode">
            <option value="open">开放加入</option>
            <option value="approval_required">需要审批</option>
            <option value="invite_only">仅邀请</option>
            <option value="admin_invite_only">仅管理员邀请</option>
            <option value="closed">禁止加入</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal('createGroupModal')">取消</button>
          <button type="submit" class="btn-primary">创建</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 邀请成员模态框 -->
  <div class="modal" id="inviteMemberModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('inviteMemberModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>邀请成员</h3>
        <button class="icon-btn" onclick="closeModal('inviteMemberModal')">✕</button>
      </div>
      <form onsubmit="inviteToGroup(event)">
        <div class="form-group">
          <label>选择好友</label>
          <div class="checkbox-list" id="inviteFriendsList"></div>
        </div>
        <div class="form-group">
          <label>邀请消息</label>
          <input type="text" id="inviteMessage" placeholder="可选">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal('inviteMemberModal')">取消</button>
          <button type="submit" class="btn-primary">邀请</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 群公告模态框 -->
  <div class="modal" id="groupNoticeModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('groupNoticeModal')"></div>
    <div class="modal-content modal-lg">
      <div class="modal-header">
        <h3>群公告</h3>
        <button class="icon-btn" onclick="closeModal('groupNoticeModal')">✕</button>
      </div>
      <div class="notice-list" id="noticeList"></div>
      <div class="modal-actions" id="noticeActions" style="display: none;">
        <button class="btn-primary" onclick="showPublishNoticeForm()">发布公告</button>
      </div>
      <form id="publishNoticeForm" style="display: none;" onsubmit="publishNotice(event)">
        <div class="form-group">
          <label>公告标题</label>
          <input type="text" id="noticeTitle" required placeholder="请输入标题">
        </div>
        <div class="form-group">
          <label>公告内容</label>
          <textarea id="noticeContent" rows="4" required placeholder="请输入内容"></textarea>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="noticePinned">
            <span>置顶公告</span>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="hidePublishNoticeForm()">取消</button>
          <button type="submit" class="btn-primary">发布</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 生成邀请码模态框 -->
  <div class="modal" id="inviteCodeModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('inviteCodeModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>生成邀请码</h3>
        <button class="icon-btn" onclick="closeModal('inviteCodeModal')">✕</button>
      </div>
      <form onsubmit="generateInviteCode(event)">
        <div class="form-group">
          <label>最大使用次数</label>
          <input type="number" id="inviteCodeMaxUses" value="10" min="1" max="1000">
        </div>
        <div class="form-group">
          <label>有效期（小时）</label>
          <input type="number" id="inviteCodeExpires" value="24" min="1" max="720">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal('inviteCodeModal')">取消</button>
          <button type="submit" class="btn-primary">生成</button>
        </div>
      </form>
      <div id="generatedCodeResult" style="display: none;">
        <div class="invite-code-display">
          <p class="code-label">邀请码</p>
          <p class="code-value" id="inviteCodeValue"></p>
          <button class="btn-secondary" onclick="copyInviteCode()">复制</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 使用邀请码模态框 -->
  <div class="modal" id="useInviteCodeModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('useInviteCodeModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>使用邀请码加入群聊</h3>
        <button class="icon-btn" onclick="closeModal('useInviteCodeModal')">✕</button>
      </div>
      <form onsubmit="joinByInviteCode(event)">
        <div class="form-group">
          <label>邀请码</label>
          <input type="text" id="joinInviteCode" required placeholder="请输入邀请码">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal('useInviteCodeModal')">取消</button>
          <button type="submit" class="btn-primary">加入</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 个人资料模态框 -->
  <div class="modal" id="profileModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('profileModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>个人资料</h3>
        <button class="icon-btn" onclick="closeModal('profileModal')">✕</button>
      </div>
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">
          <span class="avatar-placeholder">👤</span>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display: none;" onchange="uploadAvatar(this.files)">
        <button class="btn-secondary btn-sm" onclick="document.getElementById('avatarInput').click()">更换头像</button>
      </div>
      <form onsubmit="updateProfile(event)">
        <div class="form-group">
          <label>用户ID</label>
          <input type="text" id="profileUserId" disabled>
        </div>
        <div class="form-group">
          <label>昵称</label>
          <input type="text" id="profileNickname" disabled>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="profileEmail" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
          <label>个性签名</label>
          <textarea id="profileSignature" rows="2" placeholder="请输入个性签名"></textarea>
        </div>
        <button type="submit" class="btn-primary btn-block">保存</button>
      </form>
      <hr>
      <h4>修改密码</h4>
      <form onsubmit="changePassword(event)">
        <div class="form-group">
          <label>旧密码</label>
          <input type="password" id="oldPassword" required>
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="newPassword" required minlength="6">
        </div>
        <button type="submit" class="btn-secondary btn-block">修改密码</button>
      </form>
      <hr>
      <button class="btn-danger btn-block" onclick="logout()">退出登录</button>
    </div>
  </div>

  <!-- 设置模态框 -->
  <div class="modal" id="settingsModal" style="display: none;">
    <div class="modal-backdrop" onclick="closeModal('settingsModal')"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="icon-btn" onclick="closeModal('settingsModal')">✕</button>
      </div>
      <div class="settings-section">
        <h4>设备管理</h4>
        <button class="btn-secondary btn-block" onclick="showDevices()">查看登录设备</button>
        <div id="devicesList" style="margin-top: 12px;"></div>
      </div>
      <div class="settings-section">
        <h4>关于</h4>
        <p class="text-muted">HuanVae Chat v1.0</p>
        <p class="text-muted">基于 Rust + Axum 构建的即时通讯系统</p>
      </div>
    </div>
  </div>

  <!-- 添加菜单 -->
  <div class="dropdown-menu" id="addMenu" style="display: none;">
    <button class="dropdown-item" onclick="showAddFriendModal()">
      <span class="dropdown-icon">👤</span>
      添加好友
    </button>
    <button class="dropdown-item" onclick="showCreateGroupModal()">
      <span class="dropdown-icon">👥</span>
      创建群聊
    </button>
    <button class="dropdown-item" onclick="showUseInviteCodeModal()">
      <span class="dropdown-icon">🔗</span>
      使用邀请码
    </button>
  </div>

  <!-- Toast 提示容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
