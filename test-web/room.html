<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加入视频房间 - HuanVae Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-input: #16213e;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --primary: #667eea;
      --primary-hover: #5a6fd6;
      --danger: #e53e3e;
      --success: #38a169;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 加入页面 */
    .join-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .join-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .join-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .join-header .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .join-header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .join-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .room-id-display {
      background: var(--bg-input);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-bottom: 24px;
    }

    .room-id-display .label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .room-id-display .value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 4px;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid transparent;
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .btn-join {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-join:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .btn-join:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(229, 62, 62, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link a:hover {
      color: var(--primary);
    }

    /* 视频通话界面 */
    .video-container {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-dark);
    }

    .video-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
      padding: 20px;
      overflow-y: auto;
    }

    .video-item {
      position: relative;
      background: var(--bg-input);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      min-height: 200px;
    }

    .video-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-item.local {
      border: 2px solid var(--primary);
    }

    .video-label {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .video-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .control-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
    }

    .control-btn.danger {
      background: var(--danger);
    }

    .control-btn.danger:hover {
      background: #c53030;
    }

    .control-btn.muted {
      background: var(--danger);
    }

    .control-btn.active {
      background: var(--success);
    }

    /* 房间信息栏 */
    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .room-header .room-info h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .room-header .room-info span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .room-header .share-btn {
      padding: 8px 16px;
      background: var(--primary);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    /* 参与者侧边栏 */
    .participants-sidebar {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 300px;
      background: rgba(22, 33, 62, 0.95);
      backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .participants-sidebar.show {
      display: flex;
    }

    .participants-sidebar .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .participants-sidebar .header h4 {
      font-size: 16px;
    }

    .participants-sidebar .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    .participants-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .participant-item .name {
      flex: 1;
      font-size: 14px;
    }

    .participant-item .badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.15);
    }

    .participant-item .badge.creator {
      background: var(--primary);
    }

    .share-info {
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
    }

    .share-info p {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .share-info strong {
      color: var(--text-primary);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .toast {
      background: var(--bg-card);
      color: white;
      padding: 14px 20px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease;
    }

    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--danger); }
    .toast.info { border-left: 4px solid var(--primary); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .join-card {
        padding: 24px;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }

      .participants-sidebar {
        width: 100%;
      }

      .control-btn {
        width: 48px;
        height: 48px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 加入房间页面 -->
  <div class="join-container" id="joinPage">
    <div class="join-card">
      <div class="join-header">
        <div class="logo">📹</div>
        <h1>加入视频房间</h1>
        <p>输入密码即可加入实时视频通话</p>
      </div>

      <div class="room-id-display" id="roomIdDisplay" style="display: none;">
        <div class="label">房间号</div>
        <div class="value" id="displayRoomId">-</div>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="joinForm" onsubmit="handleJoin(event)">
        <div class="form-group" id="roomIdGroup">
          <label>房间号</label>
          <input type="text" id="inputRoomId" placeholder="输入6位房间号" style="text-transform: uppercase;" maxlength="6">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="text" id="inputPassword" placeholder="输入房间密码" required>
        </div>
        <div class="form-group">
          <label>您的昵称</label>
          <input type="text" id="inputDisplayName" placeholder="显示给其他人的名称" required>
        </div>
        <button type="submit" class="btn-join" id="btnJoin">加入房间</button>
      </form>

      <div class="back-link">
        <a href="index.html">← 返回主页</a>
      </div>
    </div>
  </div>

  <!-- 视频通话界面 -->
  <div class="video-container" id="videoPage">
    <div class="room-header">
      <div class="room-info">
        <h2 id="roomName">视频房间</h2>
        <span id="roomStatus">连接中...</span>
      </div>
      <button class="share-btn" onclick="shareRoom()">🔗 分享房间</button>
    </div>

    <div class="video-grid" id="videoGrid">
      <div class="video-item local" id="localVideoContainer">
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="video-label">我</div>
      </div>
    </div>

    <div class="video-controls">
      <button class="control-btn" id="btnMic" onclick="toggleMic()" title="麦克风">
        <span class="icon-on">🎤</span>
        <span class="icon-off" style="display:none;">🔇</span>
      </button>
      <button class="control-btn" id="btnCamera" onclick="toggleCamera()" title="摄像头">
        <span class="icon-on">📹</span>
        <span class="icon-off" style="display:none;">📷</span>
      </button>
      <button class="control-btn" id="btnScreen" onclick="toggleScreenShare()" title="共享屏幕">
        🖥️
      </button>
      <button class="control-btn danger" onclick="leaveRoom()" title="离开">
        📞
      </button>
      <button class="control-btn" onclick="toggleParticipants()" title="参与者">
        👥
      </button>
    </div>

    <!-- 参与者侧边栏 -->
    <div class="participants-sidebar" id="participantsSidebar">
      <div class="header">
        <h4>参与者</h4>
        <button class="close-btn" onclick="toggleParticipants()">✕</button>
      </div>
      <div class="participants-list" id="participantsList"></div>
      <div class="share-info">
        <p><strong>房间号:</strong> <span id="shareRoomId">-</span></p>
        <p><strong>密码:</strong> <span id="sharePassword">-</span></p>
        <p style="margin-top:8px;"><strong>分享链接:</strong></p>
        <p style="word-break:break-all;color:var(--primary);" id="shareLink">-</p>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // 动态获取 BASE_URL
    // 根据当前域名自动选择 API 地址
    const BASE_URL = window.location.hostname.startsWith('web.') 
      ? `${window.location.protocol}//api.${window.location.hostname.slice(4)}`  // web.xxx -> api.xxx
      : (window.location.port === '8888' || window.location.port === '5500')
        ? `${window.location.protocol}//${window.location.hostname}`  // 本地开发（去除端口）
        : window.location.origin;  // 其他情况使用当前地址

    // 复制文本到剪贴板（兼容非 HTTPS 环境）
    function copyToClipboard(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      return new Promise((resolve, reject) => {
        try { document.execCommand('copy'); resolve(); }
        catch (err) { reject(err); }
        finally { document.body.removeChild(textarea); }
      });
    }

    // 状态
    const state = {
      roomId: null,
      roomPassword: null,
      wsToken: null,
      participantId: null,
      displayName: null,
      iceServers: [],
      localStream: null,
      signalingWs: null,
      peerConnections: {},
      participants: [],
      micEnabled: true,
      cameraEnabled: true,
      isScreenSharing: false,
      // 重连相关状态
      reconnectAttempts: 0,
      maxReconnectAttempts: 10,
      reconnectTimer: null,
      heartbeatTimer: null,
      isReconnecting: false,
      shouldReconnect: true,  // 是否应该重连（用户主动离开时设为 false）
    };

    // 初始化：从 URL 获取房间号
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const roomId = params.get('room') || params.get('r');
      
      if (roomId) {
        state.roomId = roomId.toUpperCase();
        document.getElementById('displayRoomId').textContent = state.roomId;
        document.getElementById('roomIdDisplay').style.display = 'block';
        document.getElementById('roomIdGroup').style.display = 'none';
      }

      // 预填昵称
      const savedName = localStorage.getItem('webrtc_display_name');
      if (savedName) {
        document.getElementById('inputDisplayName').value = savedName;
      }
    });

    // 加入房间
    async function handleJoin(e) {
      e.preventDefault();
      
      const roomIdInput = document.getElementById('inputRoomId');
      const roomId = state.roomId || roomIdInput.value.toUpperCase().trim();
      const password = document.getElementById('inputPassword').value.trim();
      const displayName = document.getElementById('inputDisplayName').value.trim();
      
      if (!roomId) {
        showError('请输入房间号');
        return;
      }
      
      if (!password) {
        showError('请输入密码');
        return;
      }
      
      if (!displayName) {
        showError('请输入昵称');
        return;
      }
      
      // 保存昵称
      localStorage.setItem('webrtc_display_name', displayName);
      
      const btn = document.getElementById('btnJoin');
      btn.disabled = true;
      btn.textContent = '加入中...';
      hideError();
      
      try {
        const res = await fetch(`${BASE_URL}/api/webrtc/rooms/${roomId}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, display_name: displayName })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || data.message || '加入失败');
        }
        
        if (data.success) {
          state.roomId = roomId;
          state.roomPassword = password;
          state.displayName = displayName;
          state.wsToken = data.data.ws_token;
          state.participantId = data.data.participant_id;
          state.iceServers = data.data.ice_servers;
          
          // 更新分享信息
          document.getElementById('shareRoomId').textContent = roomId;
          document.getElementById('sharePassword').textContent = password;
          document.getElementById('shareLink').textContent = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
          document.getElementById('roomName').textContent = data.data.room_name || '视频房间';
          
          // 开始视频通话
          await startVideoCall();
        } else {
          throw new Error(data.error || '加入失败');
        }
      } catch (err) {
        console.error('加入失败:', err);
        if (err.message.includes('密码') || err.message.includes('401')) {
          showError('密码错误');
        } else if (err.message.includes('404') || err.message.includes('不存在')) {
          showError('房间不存在或已过期');
        } else {
          showError(err.message);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = '加入房间';
      }
    }

    // 开始视频通话
    async function startVideoCall() {
      // 重置重连状态（开始新的会话）
      state.shouldReconnect = true;
      state.reconnectAttempts = 0;
      state.isReconnecting = false;
      
      try {
        // 先枚举设备检测可用性
        const devices = await navigator.mediaDevices.enumerateDevices();
        const hasVideo = devices.some(d => d.kind === 'videoinput');
        const hasAudio = devices.some(d => d.kind === 'audioinput');
        
        console.log(`📷 设备检测: 摄像头=${hasVideo}, 麦克风=${hasAudio}`);
        
        // 根据可用设备构建约束
        let constraints = {};
        if (hasVideo) constraints.video = true;
        if (hasAudio) constraints.audio = true;
        
        // 尝试获取媒体流（带降级处理）
        if (hasVideo || hasAudio) {
          try {
            state.localStream = await navigator.mediaDevices.getUserMedia(constraints);
          } catch (e) {
            console.warn('获取媒体流失败，尝试降级:', e);
            // 降级：先尝试只获取音频
            if (hasAudio) {
              try {
                state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                state.cameraEnabled = false;
                showToast('摄像头不可用，仅使用麦克风', 'info');
              } catch {
                showToast('媒体设备不可用，将以观看模式加入', 'info');
              }
            }
          }
          
          if (state.localStream) {
            document.getElementById('localVideo').srcObject = state.localStream;
            
            // 更新按钮状态
            if (!hasVideo || !state.localStream.getVideoTracks().length) {
              state.cameraEnabled = false;
              const btn = document.getElementById('btnCamera');
              btn.classList.add('muted');
              btn.title = '无摄像头';
            }
            if (!hasAudio || !state.localStream.getAudioTracks().length) {
              state.micEnabled = false;
              const btn = document.getElementById('btnMic');
              btn.classList.add('muted');
              btn.title = '无麦克风';
            }
          }
        } else {
          showToast('未检测到音视频设备，将以观看模式加入', 'info');
        }
        
        // 切换到视频界面
        document.getElementById('joinPage').style.display = 'none';
        document.getElementById('videoPage').style.display = 'flex';
        
        // 连接信令服务器
        connectSignaling();
        
      } catch (err) {
        console.error('获取媒体设备失败:', err);
        // 即使失败也允许加入（观看模式）
        showToast('媒体设备不可用，将以观看模式加入', 'info');
        document.getElementById('joinPage').style.display = 'none';
        document.getElementById('videoPage').style.display = 'flex';
        connectSignaling();
      }
    }
    
    // 开始屏幕共享
    async function startScreenShare() {
      try {
        const screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: 'always' },
          audio: true  // 可选：共享系统音频
        });
        
        // 保存原始摄像头流
        const originalStream = state.localStream;
        
        // 替换本地视频为屏幕共享
        state.localStream = screenStream;
        state.isScreenSharing = true;
        document.getElementById('localVideo').srcObject = screenStream;
        
        // 更新按钮状态
        const btn = document.getElementById('btnScreen');
        btn.classList.add('active');
        btn.title = '停止共享';
        
        // 为每个 PeerConnection 添加或替换视频轨道
        const videoTrack = screenStream.getVideoTracks()[0];
        for (const [peerId, pc] of Object.entries(state.peerConnections)) {
          const sender = pc.getSenders().find(s => s.track?.kind === 'video');
          if (sender) {
            // 已有视频轨道，直接替换
            console.log('🔄 替换视频轨道:', peerId);
            await sender.replaceTrack(videoTrack);
          } else {
            // 没有视频轨道，需要添加并重新协商
            console.log('➕ 添加视频轨道并重新协商:', peerId);
            pc.addTrack(videoTrack, screenStream);
            
            // 重新协商
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            sendSignaling({ type: 'offer', to: peerId, sdp: pc.localDescription.sdp });
          }
        }
        
        // 监听用户停止共享（点击浏览器的"停止共享"按钮）
        videoTrack.onended = () => {
          stopScreenShare(originalStream);
        };
        
        showToast('屏幕共享已开始', 'success');
      } catch (err) {
        console.error('屏幕共享失败:', err);
        if (err.name !== 'AbortError') {
          showToast('屏幕共享失败: ' + err.message, 'error');
        }
      }
    }
    
    // 停止屏幕共享
    async function stopScreenShare(originalStream) {
      if (!state.isScreenSharing) return;
      
      // 停止屏幕共享流
      if (state.localStream) {
        state.localStream.getTracks().forEach(t => t.stop());
      }
      
      state.isScreenSharing = false;
      
      // 恢复摄像头流或重新获取
      try {
        if (originalStream && originalStream.active) {
          state.localStream = originalStream;
        } else {
          // 重新获取摄像头
          const devices = await navigator.mediaDevices.enumerateDevices();
          const hasVideo = devices.some(d => d.kind === 'videoinput');
          const hasAudio = devices.some(d => d.kind === 'audioinput');
          
          if (hasVideo || hasAudio) {
            state.localStream = await navigator.mediaDevices.getUserMedia({
              video: hasVideo,
              audio: hasAudio
            });
          }
        }
        
        if (state.localStream) {
          document.getElementById('localVideo').srcObject = state.localStream;
          
          // 替换 PeerConnection 中的轨道
          const videoTrack = state.localStream.getVideoTracks()[0];
          if (videoTrack) {
            Object.values(state.peerConnections).forEach(pc => {
              const sender = pc.getSenders().find(s => s.track?.kind === 'video');
              if (sender) {
                sender.replaceTrack(videoTrack);
              }
            });
          }
        }
      } catch (e) {
        console.warn('恢复摄像头失败:', e);
      }
      
      // 更新按钮状态
      const btn = document.getElementById('btnScreen');
      btn.classList.remove('active');
      btn.title = '共享屏幕';
      
      showToast('屏幕共享已停止', 'info');
    }
    
    // 切换屏幕共享
    function toggleScreenShare() {
      if (state.isScreenSharing) {
        stopScreenShare();
      } else {
        startScreenShare();
      }
    }

    // 连接信令服务器（支持自动重连）
    function connectSignaling() {
      // 清除之前的重连定时器
      if (state.reconnectTimer) {
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = null;
      }
      
      const wsUrl = `${BASE_URL.replace('http', 'ws')}/ws/webrtc/rooms/${state.roomId}?token=${state.wsToken}`;
      
      console.log('🔗 连接信令服务器:', wsUrl, state.isReconnecting ? '(重连)' : '');
      document.getElementById('roomStatus').textContent = state.isReconnecting ? '重连中...' : '连接中...';
      
      const ws = new WebSocket(wsUrl);
      state.signalingWs = ws;
      
      ws.onopen = () => {
        console.log('✅ 信令连接已建立');
        document.getElementById('roomStatus').textContent = '已连接';
        
        // 重置重连计数
        state.reconnectAttempts = 0;
        state.isReconnecting = false;
        
        if (state.reconnectAttempts === 0) {
          showToast('已连接到房间', 'success');
        } else {
          showToast('重新连接成功', 'success');
        }
        
        // 启动心跳
        startHeartbeat();
      };
      
      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        handleSignalingMessage(msg);
      };
      
      ws.onclose = (event) => {
        console.log('❌ 信令连接已断开, code:', event.code, 'reason:', event.reason);
        document.getElementById('roomStatus').textContent = '已断开';
        
        // 停止心跳
        stopHeartbeat();
        
        // 检查是否应该重连
        if (state.shouldReconnect && state.roomId && state.wsToken) {
          attemptReconnect();
        } else if (state.roomId) {
          showToast('与房间的连接已断开', 'error');
        }
      };
      
      ws.onerror = (err) => {
        console.error('信令错误:', err);
        // 不在这里显示 toast，让 onclose 处理
      };
    }
    
    // 尝试重连
    function attemptReconnect() {
      if (state.reconnectAttempts >= state.maxReconnectAttempts) {
        console.log('❌ 达到最大重连次数，停止重连');
        showToast('连接失败，请刷新页面重试', 'error');
        state.isReconnecting = false;
        return;
      }
      
      state.reconnectAttempts++;
      state.isReconnecting = true;
      
      // 指数退避：1s, 2s, 4s, 8s... 最大 30s
      const delay = Math.min(1000 * Math.pow(2, state.reconnectAttempts - 1), 30000);
      
      console.log(`🔄 ${delay/1000}秒后尝试第 ${state.reconnectAttempts} 次重连...`);
      document.getElementById('roomStatus').textContent = `重连中 (${state.reconnectAttempts}/${state.maxReconnectAttempts})...`;
      showToast(`连接断开，${delay/1000}秒后重连...`, 'warning');
      
      state.reconnectTimer = setTimeout(() => {
        if (state.shouldReconnect) {
          connectSignaling();
        }
      }, delay);
    }
    
    // 启动心跳
    function startHeartbeat() {
      stopHeartbeat();
      
      // 每 25 秒发送一次心跳
      state.heartbeatTimer = setInterval(() => {
        if (state.signalingWs && state.signalingWs.readyState === WebSocket.OPEN) {
          try {
            state.signalingWs.send(JSON.stringify({ type: 'ping' }));
            console.log('💓 心跳发送');
          } catch (e) {
            console.error('心跳发送失败:', e);
          }
        }
      }, 25000);
    }
    
    // 停止心跳
    function stopHeartbeat() {
      if (state.heartbeatTimer) {
        clearInterval(state.heartbeatTimer);
        state.heartbeatTimer = null;
      }
    }

    // 处理信令消息
    function handleSignalingMessage(msg) {
      console.log('📨 收到信令:', msg.type);
      
      switch (msg.type) {
        case 'joined':
          state.participantId = msg.participant_id;
          state.participants = msg.participants;
          renderParticipants();
          console.log('📋 房间内已有参与者:', msg.participants.map(p => p.id));
          msg.participants.forEach(p => {
            if (p.id !== state.participantId) {
              // 使用 participant_id 比较决定谁发起 offer（ID 更小的发起）
              const shouldOffer = state.participantId < p.id;
              console.log(`🔗 与 ${p.id} 建立连接，我${shouldOffer ? '发起' : '等待'} offer`);
              createPeerConnection(p.id, shouldOffer);
            }
          });
          break;
          
        case 'peer_joined':
          state.participants.push(msg.participant);
          renderParticipants();
          showToast(`${msg.participant.name} 加入了房间`, 'info');
          // 为新参与者创建 PeerConnection
          // 使用 participant_id 比较决定谁发起 offer（ID 更小的发起）
          if (state.participantId < msg.participant.id) {
            console.log('🔗 我先加入，我发起 offer 给新参与者:', msg.participant.id);
            createPeerConnection(msg.participant.id, true);
          } else {
            console.log('🔗 新参与者会发起 offer，我等待:', msg.participant.id);
            // 预先创建 PC 但不发 offer，等待对方的 offer
            createPeerConnection(msg.participant.id, false);
          }
          break;
          
        case 'peer_left':
          state.participants = state.participants.filter(p => p.id !== msg.participant_id);
          closePeerConnection(msg.participant_id);
          renderParticipants();
          showToast('有人离开了房间', 'info');
          break;
          
        case 'offer':
          handleOffer(msg.from, msg.sdp);
          break;
          
        case 'answer':
          handleAnswer(msg.from, msg.sdp);
          break;
          
        case 'candidate':
          handleCandidate(msg.from, msg.candidate);
          break;
          
        case 'room_closed':
          showToast('房间已关闭: ' + msg.reason, 'error');
          leaveRoom();
          break;
          
        case 'error':
          console.error('信令错误:', msg.code, msg.message);
          showToast(msg.message, 'error');
          break;
      }
    }

    // WebRTC 连接管理
    function createPeerConnection(peerId, createOffer = false) {
      console.log('🔌 创建 PeerConnection:', peerId);
      
      const pc = new RTCPeerConnection({ iceServers: state.iceServers });
      state.peerConnections[peerId] = pc;
      
      if (state.localStream) {
        state.localStream.getTracks().forEach(track => {
          pc.addTrack(track, state.localStream);
        });
      }
      
      pc.onicecandidate = (event) => {
        if (event.candidate) {
          sendSignaling({ type: 'candidate', to: peerId, candidate: event.candidate });
        }
      };
      
      pc.ontrack = (event) => {
        console.log('📺 收到远程轨道:', peerId, 'kind:', event.track.kind, 'streams:', event.streams.length);
        // 处理 streams 可能为空的情况
        if (event.streams && event.streams[0]) {
          addRemoteVideo(peerId, event.streams[0]);
        } else {
          // 如果没有关联的 stream，创建一个新的
          console.log('⚠️ 没有关联的 stream，创建新的 MediaStream');
          const stream = new MediaStream([event.track]);
          addRemoteVideo(peerId, stream);
        }
      };
      
      // 监控 ICE 连接状态
      pc.oniceconnectionstatechange = () => {
        console.log('🔌 ICE 连接状态:', peerId, pc.iceConnectionState);
        if (pc.iceConnectionState === 'failed') {
          console.error('❌ ICE 连接失败:', peerId);
          showToast(`与 ${peerId} 的连接失败`, 'error');
        } else if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          console.log('✅ ICE 连接成功:', peerId);
        }
      };
      
      // 监控连接状态
      pc.onconnectionstatechange = () => {
        console.log('🔗 连接状态:', peerId, pc.connectionState);
      };
      
      if (createOffer) {
        pc.createOffer()
          .then(offer => pc.setLocalDescription(offer))
          .then(() => {
            sendSignaling({ type: 'offer', to: peerId, sdp: pc.localDescription.sdp });
          })
          .catch(err => console.error('创建 Offer 失败:', err));
      }
      
      return pc;
    }

    async function handleOffer(peerId, sdp) {
      let pc = state.peerConnections[peerId];
      if (!pc) {
        pc = createPeerConnection(peerId, false);
      }
      
      await pc.setRemoteDescription({ type: 'offer', sdp });
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      
      sendSignaling({ type: 'answer', to: peerId, sdp: answer.sdp });
    }

    async function handleAnswer(peerId, sdp) {
      const pc = state.peerConnections[peerId];
      if (pc) {
        await pc.setRemoteDescription({ type: 'answer', sdp });
      }
    }

    async function handleCandidate(peerId, candidate) {
      const pc = state.peerConnections[peerId];
      if (pc) {
        await pc.addIceCandidate(new RTCIceCandidate(candidate));
      }
    }

    function sendSignaling(msg) {
      if (state.signalingWs && state.signalingWs.readyState === WebSocket.OPEN) {
        state.signalingWs.send(JSON.stringify(msg));
      }
    }

    function closePeerConnection(peerId) {
      const pc = state.peerConnections[peerId];
      if (pc) {
        pc.close();
        delete state.peerConnections[peerId];
      }
      const videoEl = document.getElementById(`video-${peerId}`);
      if (videoEl) {
        videoEl.parentElement.remove();
      }
    }

    function addRemoteVideo(peerId, stream) {
      const grid = document.getElementById('videoGrid');
      
      if (document.getElementById(`video-${peerId}`)) {
        document.getElementById(`video-${peerId}`).srcObject = stream;
        return;
      }
      
      const participant = state.participants.find(p => p.id === peerId);
      const name = participant?.name || peerId;
      
      const container = document.createElement('div');
      container.className = 'video-item';
      container.id = `video-container-${peerId}`;
      container.innerHTML = `
        <video id="video-${peerId}" autoplay playsinline></video>
        <div class="video-label">${name}</div>
      `;
      
      grid.appendChild(container);
      document.getElementById(`video-${peerId}`).srcObject = stream;
    }

    function renderParticipants() {
      const list = document.getElementById('participantsList');
      list.innerHTML = state.participants.map(p => `
        <div class="participant-item">
          <span class="name">${p.name}</span>
          ${p.is_creator ? '<span class="badge creator">创建者</span>' : ''}
          ${p.id === state.participantId ? '<span class="badge">我</span>' : ''}
        </div>
      `).join('');
    }

    // 控制功能
    function toggleMic() {
      state.micEnabled = !state.micEnabled;
      if (state.localStream) {
        state.localStream.getAudioTracks().forEach(track => {
          track.enabled = state.micEnabled;
        });
      }
      const btn = document.getElementById('btnMic');
      btn.querySelector('.icon-on').style.display = state.micEnabled ? '' : 'none';
      btn.querySelector('.icon-off').style.display = state.micEnabled ? 'none' : '';
      btn.classList.toggle('muted', !state.micEnabled);
    }

    function toggleCamera() {
      state.cameraEnabled = !state.cameraEnabled;
      if (state.localStream) {
        state.localStream.getVideoTracks().forEach(track => {
          track.enabled = state.cameraEnabled;
        });
      }
      const btn = document.getElementById('btnCamera');
      btn.querySelector('.icon-on').style.display = state.cameraEnabled ? '' : 'none';
      btn.querySelector('.icon-off').style.display = state.cameraEnabled ? 'none' : '';
      btn.classList.toggle('muted', !state.cameraEnabled);
    }

    function toggleParticipants() {
      document.getElementById('participantsSidebar').classList.toggle('show');
    }

    function leaveRoom() {
      // 禁止自动重连（用户主动离开）
      state.shouldReconnect = false;
      
      // 清除重连定时器
      if (state.reconnectTimer) {
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = null;
      }
      
      // 停止心跳
      stopHeartbeat();
      
      sendSignaling({ type: 'leave' });
      
      Object.keys(state.peerConnections).forEach(closePeerConnection);
      
      if (state.signalingWs) {
        state.signalingWs.close();
        state.signalingWs = null;
      }
      
      if (state.localStream) {
        state.localStream.getTracks().forEach(track => track.stop());
        state.localStream = null;
      }
      
      // 返回加入页面
      document.getElementById('videoPage').style.display = 'none';
      document.getElementById('joinPage').style.display = 'flex';
      
      // 清除视频
      const grid = document.getElementById('videoGrid');
      grid.innerHTML = `
        <div class="video-item local" id="localVideoContainer">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="video-label">我</div>
        </div>
      `;
      
      state.roomId = null;
      state.roomPassword = null;
      state.wsToken = null;
      state.participantId = null;
      state.participants = [];
      state.peerConnections = {};
      
      showToast('已离开房间', 'info');
    }

    function shareRoom() {
      const link = `${window.location.origin}${window.location.pathname}?room=${state.roomId}`;
      copyToClipboard(link).then(() => {
        showToast('房间链接已复制', 'success');
      });
    }

    // UI 辅助
    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMessage').style.display = 'none';
    }

    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
